<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ganti Password - Kurnia Rental Admin</title>
  <link rel="stylesheet" href="/admin/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div>
      <h2><span>Kurnia</span> Rental</h2>
      <p>Panel Administrator</p>
    </div>
    <button class="sidebar-close" aria-label="Tutup menu">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Menu</div>
    <a href="/admin/dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="/admin/motors.html" class="nav-item"><i class="fa-solid fa-motorcycle"></i> Data Motor</a>
    <a href="/admin/customers.html" class="nav-item"><i class="fa-solid fa-users"></i> Data Customer</a>
    <a href="/admin/change_password.html" class="nav-item active"><i class="fa-solid fa-key"></i> Ganti Password</a>
    <a href="/admin/bookings.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i> Booking</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" onclick="openLogoutConfirm()">
      <i class="fa-solid fa-right-from-bracket"></i> Keluar
    </button>
  </div>
</aside>

<!-- Overlay untuk menutup sidebar di layar kecil -->
<div class="sidebar-overlay"></div>

<div class="main">
  <div class="topbar">
    <button class="menu-toggle" aria-label="Buka menu"><i class="fa-solid fa-bars"></i></button>
    <h1>Ganti Password</h1>
  </div>
  <div class="content">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <div class="card-header">
        <h2>Ubah Akun Admin</h2>
      </div>
      <div class="card-body" style="padding:1.5rem;">
        <div class="form-group">
          <label>Username Baru</label>
          <input type="text" id="new-username" class="form-control" placeholder="Username baru">
        </div>
        <div class="form-group">
          <label>Password Baru</label>
          <div class="password-field">
          <input type="password" id="new-password" class="form-control" placeholder="Password baru">
          <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility(this)" tabindex="-1" aria-label="Lihat password"><i class="fa-solid fa-eye"></i></button>
        </div>
        </div>
        <div class="form-group">
          <label>Konfirmasi Password Baru</label>
          <div class="password-field">
          <input type="password" id="confirm-password" class="form-control" placeholder="Ulangi password baru">
          <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility(this)" tabindex="-1" aria-label="Lihat password"><i class="fa-solid fa-eye"></i></button>
        </div>
        </div>
        <div class="form-group">
          <label>Password Lama *</label>
          <div class="password-field">
          <input type="password" id="current-password" class="form-control" placeholder="Masukkan password lama" required>
          <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility(this)" tabindex="-1" aria-label="Lihat password"><i class="fa-solid fa-eye"></i></button>
        </div>
        </div>
        <div style="display:flex;gap:.75rem;flex-wrap:wrap;justify-content:flex-end;">
          <button class="btn btn-outline" onclick="history.back()">Batal</button>
          <button class="btn btn-primary" onclick="updateAccount()">Simpan</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="logout-confirm">
  <div class="modal">
    <div class="modal-header">
      <h3>Konfirmasi Logout</h3>
    </div>
    <div class="modal-body">
      <p>Anda yakin ingin keluar dari akun ini?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeLogoutConfirm()">Batal</button>
      <button class="btn btn-danger" onclick="doLogout()">Keluar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  function togglePasswordVisibility(btn) {
    const input = btn.previousElementSibling;
    const icon  = btn.querySelector('i');
    const showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    icon.classList.toggle('fa-eye', showing);
    icon.classList.toggle('fa-eye-slash', !showing);
  }

  function openLogoutConfirm() {
    document.getElementById('logout-confirm').classList.add('show');
  }

  function closeLogoutConfirm() {
    document.getElementById('logout-confirm').classList.remove('show');
  }

  async function doLogout() {
    await fetch('/api/admin/logout', {method:'POST', credentials:'include'});
    location.href = '/admin/login.html';
  }

  async function updateAccount() {
    const username = document.getElementById('new-username').value.trim();
    const password = document.getElementById('new-password').value;
    const confirm  = document.getElementById('confirm-password').value;
    const current  = document.getElementById('current-password').value;

    if (!current) {
      showToast('Password lama wajib diisi', 'error'); return;
    }
    if (password && password !== confirm) {
      showToast('Password baru tidak cocok', 'error'); return;
    }
    if (!username && !password) {
      showToast('Masukkan username baru atau password baru', 'error'); return;
    }

    const res = await fetch('/api/admin/account', {
      method:'PUT', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password, current_password: current})
    });
    const data = await res.json();
    showToast(data.message, data.success ? 'success' : 'error');
    if (data.success) {
      setTimeout(() => location.href = '/admin/dashboard.html', 1200);
    }
  }

  function showToast(msg, type='success') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `show ${type}`;
    setTimeout(() => el.className = '', 3000);
  }
</script>
<script src="/admin/js/sidebar.js"></script>
</body>
</html>
