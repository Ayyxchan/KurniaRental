<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Customer - Kurnia Rental Admin</title>
  <link rel="stylesheet" href="/admin/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div>
      <h2><span>Kurnia</span> Rental</h2>
      <p>Panel Administrator</p>
    </div>
    <button class="sidebar-close" aria-label="Tutup menu">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Menu</div>
    <a href="/admin/dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="/admin/motors.html" class="nav-item"><i class="fa-solid fa-motorcycle"></i> Data Motor</a>
    <a href="/admin/customers.html" class="nav-item active"><i class="fa-solid fa-users"></i> Data Customer</a>
    <a href="/admin/change_password.html" class="nav-item"><i class="fa-solid fa-key"></i> Ganti Password</a>
    <a href="/admin/bookings.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i> Booking</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" onclick="openLogoutConfirm()">
      <i class="fa-solid fa-right-from-bracket"></i> Keluar
    </button>
  </div>
</aside>

<!-- Overlay untuk menutup sidebar di layar kecil -->
<div class="sidebar-overlay"></div>

<div class="main">
  <div class="topbar">
    <button class="menu-toggle" aria-label="Buka menu"><i class="fa-solid fa-bars"></i></button>
    <h1>Data Customer</h1>
    <button class="btn btn-primary" onclick="refreshCustomers()">
      <i class="fa-solid fa-arrows-rotate"></i> Segarkan
    </button>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header">
        <h2>List Customer</h2>
        <span id="total-customers" style="color:var(--text-muted);font-size:.85rem;"></span>
      </div>
      <table>
        <thead>
          <tr>
            <th>NO.</th>
            <th>Nama</th>
            <th>No. HP</th>
            <th>Email</th>
            <th>Jenis Kelamin</th>
            <th>Alamat</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="customer-tbody">
          <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted);">
            <i class="fa-solid fa-spinner fa-spin"></i> Memuat data...
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-customer-detail">
  <div class="modal">
    <div class="modal-header">
      <h3>Detail Customer</h3>
      <button class="btn-close-modal" onclick="closeCustomerDetail()">&times;</button>
    </div>
    <div class="modal-body" id="customer-detail-body" style="display:flex;flex-direction:column;gap:.9rem;">
      <!-- diisi oleh JS -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCustomerDetail()">Tutup</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="logout-confirm">
  <div class="modal">
    <div class="modal-header">
      <h3>Konfirmasi Logout</h3>
    </div>
    <div class="modal-body">
      <p>Anda yakin ingin keluar dari akun ini?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeLogoutConfirm()">Batal</button>
      <button class="btn btn-danger" onclick="doLogout()">Keluar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let customerData = [];

  async function refreshCustomers() {
    const tbody = document.getElementById('customer-tbody');
    try {
      const res = await fetch('/api/admin/customers', {credentials:'include'});
      if (res.status === 401) { location.href='/admin/login.html'; return; }
      if (!res.ok) throw new Error(`Server merespons status ${res.status}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'Gagal memuat data customer');
      customerData = data.data || [];
      renderCustomers();
    } catch (err) {
      console.error('Gagal memuat data customer:', err);
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--danger);">
        <i class="fa-solid fa-triangle-exclamation"></i> Gagal memuat data customer.<br>
        <small style="color:var(--text-muted);">${(err && err.message) || 'Periksa koneksi ke server.'}</small><br>
        <button class="btn btn-outline btn-sm" style="margin-top:.75rem;" onclick="refreshCustomers()">
          <i class="fa-solid fa-arrows-rotate"></i> Coba Lagi
        </button>
      </td></tr>`;
    }
  }

  function renderCustomers() {
    const tbody = document.getElementById('customer-tbody');
    if (!customerData.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted);">Belum ada data customer.</td></tr>';
      document.getElementById('total-customers').textContent = '0 customer';
      return;
    }
    document.getElementById('total-customers').textContent = `${customerData.length} customer`;
    tbody.innerHTML = customerData.map((c, i) => `
      <tr>
        <td>${i+1}</td>
        <td>${c.nama}</td>
        <td>${c.no_hp}</td>
        <td>${c.email || '-'}</td>
        <td>${c.jenis_kelamin || '-'}</td>
        <td>${c.alamat || '-'}</td>
        <td style="white-space:nowrap;">
          <button class="btn btn-outline btn-sm" onclick="openCustomerDetail(${c.id})">
            <i class="fa-solid fa-eye"></i>
          </button>
          <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id}, '${(c.nama || '').replace(/'/g, "\\'")}')">
            <i class="fa-solid fa-trash"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  async function deleteCustomer(id, nama) {
    if (!confirm(`Hapus customer "${nama}"? Semua riwayat booking milik customer ini juga akan ikut terhapus dan tidak bisa dikembalikan.`)) return;
    try {
      const res  = await fetch(`/api/admin/customers/${id}`, {
        method: 'DELETE', credentials: 'include'
      });
      const data = await res.json();
      showToast(data.message, data.success ? 'success' : 'error');
      if (data.success) refreshCustomers();
    } catch (err) {
      console.error('Gagal menghapus customer:', err);
      showToast('Gagal menghapus customer', 'error');
    }
  }

  function openCustomerDetail(id) {
    const c = customerData.find(c => c.id === id);
    if (!c) return;

    const rows = [
      ['Nama Lengkap', c.nama || '-'],
      ['No. HP', c.no_hp || '-'],
      ['Email', c.email || '-'],
      ['Tanggal Lahir', c.tanggal_lahir ? c.tanggal_lahir.split(' ')[0] : '-'],
      ['Jenis Kelamin', c.jenis_kelamin || '-'],
      ['Alamat', c.alamat || '-'],
      ['Terdaftar Sejak', c.created_at ? c.created_at.split(' ')[0] : '-'],
    ];

    document.getElementById('customer-detail-body').innerHTML = rows.map(([label, value]) => `
      <div>
        <p style="font-size:.78rem;color:var(--text-muted);margin-bottom:.2rem;font-weight:600;">${label}</p>
        <p style="font-size:.95rem;">${value}</p>
      </div>
    `).join('');

    document.getElementById('modal-customer-detail').classList.add('show');
  }

  function closeCustomerDetail() {
    document.getElementById('modal-customer-detail').classList.remove('show');
  }

  function openLogoutConfirm() {
    document.getElementById('logout-confirm').classList.add('show');
  }

  function closeLogoutConfirm() {
    document.getElementById('logout-confirm').classList.remove('show');
  }

  async function doLogout() {
    await fetch('/api/admin/logout', {method:'POST', credentials:'include'});
    location.href = '/admin/login.html';
  }

  function showToast(msg, type='success') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `show ${type}`;
    setTimeout(() => el.className = '', 3000);
  }

  refreshCustomers();
</script>
<script src="/admin/js/sidebar.js"></script>
</body>
</html>
